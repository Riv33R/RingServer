{% extends "base.html" %}
{% block title %}Календарь исключений{% endblock %}
{% block page_title %}Календарь исключений{% endblock %}

{% block content %}
<div class="calendar-page">
    <div class="card mb-4 calendar-controls">
        <div class="month-selector">
            <button class="btn btn-ghost" onclick="changeMonth(-1)">◀ Пред.</button>
            <h2 id="currentMonthLabel" class="month-label">Март 2026</h2>
            <button class="btn btn-ghost" onclick="changeMonth(1)">След. ▶</button>
            <button class="btn btn-ghost ml-auto" onclick="goToday()">Сегодня</button>
        </div>
    </div>

    <div class="card calendar-card">
        <div class="calendar-grid">
            <div class="cal-header">Пн</div>
            <div class="cal-header">Вт</div>
            <div class="cal-header">Ср</div>
            <div class="cal-header">Чт</div>
            <div class="cal-header">Пт</div>
            <div class="cal-header cal-weekend">Сб</div>
            <div class="cal-header cal-weekend">Вс</div>
            
            <div id="calendarDays" class="cal-days">
                <!-- Days will be generated by JS -->
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Override Modal -->
<div class="modal-backdrop" id="overrideModal" onclick="closeModal(event)">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="modalTitle">Настройка дня: <span id="modalDateLabel"></span></h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <form id="overrideForm">
            <input type="hidden" id="fDate">
            <div class="form-group">
                <label class="form-label">Действие в этот день</label>
                <select class="form-select" id="fProfile" onchange="toggleDesc()">
                    <option value="_default">— По стандартному расписанию —</option>
                    <option value="">🔕 Нет звонков (Выходной / Каникулы)</option>
                    <optgroup label="Особое расписание (Профили)">
                        {% for p in profiles %}
                        <option value="{{ p.id }}">{{ p.name }}</option>
                        {% endfor %}
                    </optgroup>
                </select>
            </div>
            <div class="form-group" id="descGroup" style="display:none;">
                <label class="form-label">Причина (описание)</label>
                <input type="text" class="form-input" id="fDesc" placeholder="Например: 8 Марта, Карантин">
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" onclick="closeModal()">Отмена</button>
                <button type="button" class="btn btn-danger-ghost" id="btnDeleteOverride" onclick="deleteOverride()" style="display:none;">Очистить</button>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
{% endblock %}
